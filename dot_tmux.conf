# =============================================================================
# tmux configuration
# =============================================================================

# -- terminal & features ------------------------------------------------------

# Default TERM for new windows — must be "screen", "tmux", or a derivative
set -g default-terminal "tmux-256color"

# terminal-overrides: patch terminfo(5) capabilities for matching terminal types
#   tmux-256color:RGB  → add Tc (true-color / 24-bit RGB via SGR escapes)
#   *:Sxl              → add SIXEL graphics capability for all terminals
#   tmux*:Ss/Se        → cursor style set (Ss) and reset (Se) sequences
set -as terminal-overrides "tmux-256color:RGB"
set -as terminal-overrides "*:Sxl=\\E[?80h"
set -as terminal-overrides "tmux*:Ss=\\e[%p1%d q:Se=\\e[2 q"

# terminal-features: enable named feature bundles for matching terminal types
#   sixel     → SIXEL graphics (inline images in the terminal)
#   clipboard → allow setting the system clipboard via xterm OSC 52
set -as terminal-features ",tmux-256color:sixel"
set -as terminal-features ",tmux-256color:clipboard"

# -- keys & input ------------------------------------------------------------
set -g escape-time 40
set -g extended-keys on
set -g focus-events on

set -g status-keys vi
setw -g mode-keys vi

# -- behaviour ---------------------------------------------------------------
set -g base-index 1
setw -g pane-base-index 1

set -gq allow-passthrough on
set -g visual-activity off

# -- clipboard ---------------------------------------------------------------
set -s set-clipboard on

# -- prefix & core bindings --------------------------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind r source-file ~/.tmux.conf \; display-message "Reload config"
bind Q kill-pane

# -- pane management ---------------------------------------------------------
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind c new-window -c "#{pane_current_path}"
bind w resize-pane -Z
unbind z

# -- navigation --------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize (uncomment to enable)
# bind -r H resize-pane -L 5 \; display-message "Resize left"
# bind -r J resize-pane -D 5 \; display-message "Resize down"
# bind -r K resize-pane -U 5 \; display-message "Resize up"
# bind -r L resize-pane -R 5 \; display-message "Resize right"

# -- launcher -----------------------------------------------------------------
bind f display-popup -E tmux-sessionizer

# -- copy mode ---------------------------------------------------------------
bind -T copy-mode J send -X page-down
bind -T copy-mode K send -X page-up
bind -T copy-mode-vi J send -X page-down
bind -T copy-mode-vi K send -X page-up

bind -T copy-mode v send-keys -X begin-selection
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# yank (use wl-copy on Wayland)
bind -T copy-mode y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
